<P><A NAME="save_project__command_"></A>Save Project (command)</P>

<P>File menu</P>

<P><IMG SRC="../images/bm10.gif" ALT="" BORDER=0>Saves an opened project as a disk file with an .XCL extension.  Replaces all information previously saved. </P>

<P>If no filename is given, the <A HREF="save_project_as__command_.htm">Save As command</A> is prompted.</P>
