<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a2636"/>
  <!-- "TC" wordmark -->
  <text x="256" y="300" text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900" font-size="220" fill="#e8f4ff"
    letter-spacing="-8">TC</text>
  <!-- Strain gauge symbol: three parallel horizontal lines with end tabs -->
  <g stroke="#3d9fc0" stroke-linecap="round" fill="none">
    <line x1="100" y1="370" x2="412" y2="370" stroke-width="10"/>
    <line x1="100" y1="395" x2="412" y2="395" stroke-width="10"/>
    <line x1="100" y1="420" x2="412" y2="420" stroke-width="10"/>
    <line x1="100" y1="362" x2="100" y2="428" stroke-width="10"/>
    <line x1="412" y1="362" x2="412" y2="428" stroke-width="10"/>
  </g>
</svg>
